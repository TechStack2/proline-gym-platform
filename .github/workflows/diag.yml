name: Diag (temp)
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    env:
      PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: impersonate owner, eval notifications INSERT conditions
        run: |
          set -uo pipefail
          : "${PROJECT_REF:=ufpuebfkcpohwubrutff}"
          API="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"
          run_sql() {
            local sql; sql="$(cat)"; local body; body="$(jq -Rs '{query: .}' <<<"$sql")"
            curl -sS -X POST "$API" -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" --data-binary "$body" | jq .
          }
          echo "=== owner-context evaluation of the notifications INSERT policy conditions ==="
          run_sql <<'SQL'
          set local role authenticated;
          select set_config('request.jwt.claims',
            (select json_build_object('sub', u.id::text, 'role','authenticated')::text
             from auth.users u where u.email='owner@prolinegym.lb'), true);
          select
            (auth.uid())::text                                   as uid,
            get_user_role()                                      as role,
            is_staff()                                           as is_staff,
            get_user_gym_id()::text                              as gym,
            (select p.id::text from profiles p join auth.users u on u.id=p.id where u.email='student@prolinegym.lb') as student_profile,
            recipient_in_gym(
              (select p.id from profiles p join auth.users u on u.id=p.id where u.email='student@prolinegym.lb'),
              get_user_gym_id()
            )                                                    as recipient_ok;
          SQL
          echo "=== the notifications INSERT policy as applied on cloud ==="
          run_sql <<'SQL'
          select polname, pg_get_expr(polwithcheck, polrelid) as with_check
          from pg_policy where polrelid = 'public.notifications'::regclass and polcmd = 'a';
          SQL
