name: DB Replay Check (migrations replay from zero)

# ISO-DB Phase 0b — the LIVE confirmation Phase 0 (static analysis) couldn't run
# locally, and a PERMANENT migration-replay guard. Spins a real, isolated Supabase
# stack on the runner (Postgres + GoTrue + Storage + PostgREST via Docker) and
# replays ALL migrations from an EMPTY DB via `supabase db reset`. Catches exactly
# the class of bug Phase 0 found (000008's out-of-band `app.demo_password` GUC) +
# surfaces the flagged risks (direct auth.users inserts, storage buckets/policies).
#
# Standalone + additive: this does NOT touch e2e.yml and needs NO secrets — it never
# talks to the cloud project (that's the whole point of the isolated local stack).
# Phase 1 (e2e on the local stack) is separate and not started here.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - 'supabase/seed.sql'
      - '.github/workflows/db-replay-check.yml'
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - 'supabase/seed.sql'

# Independent of the e2e-cloud gate — this uses a per-run LOCAL stack, so it can run
# concurrently with anything. Cancel superseded runs on the same ref.
concurrency:
  group: db-replay-${{ github.ref }}
  cancel-in-progress: true

jobs:
  replay:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install the Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # CI-INFRA-PIN: pin the CLI (was `latest`, which resolves the newest release
          # via the UNAUTHENTICATED GitHub API every run → the 60-req/hr limit gets
          # exhausted on busy CI → the whole job died at "Install the Supabase CLI").
          # A fixed npm version is fetched directly, no rate-limited "resolve latest"
          # call. 2.109.0 = latest STABLE (2026-06-30); supports supabase start / db reset / stop.
          version: 2.109.0
        env:
          # Belt-and-suspenders: authenticate any GitHub API call setup-cli still makes
          # for the pinned tag (anon 60/hr → 5000/hr). GITHUB_TOKEN is the built-in token.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Start an isolated local Supabase stack (Docker)
        run: |
          set -euo pipefail
          # `supabase start` boots Postgres + GoTrue + Storage + PostgREST and applies
          # the migration chain on first boot — a from-zero replay in itself.
          supabase start

      - name: Replay ALL migrations from an EMPTY DB (the from-zero check)
        run: |
          set -euo pipefail
          # `db reset` drops the DB and re-applies 000001 → latest from scratch, then
          # the (no-op) seed. Non-zero exit on ANY broken migration → this job goes red.
          supabase db reset
          echo "✅ supabase db reset exited 0 — the full migration chain replays clean from zero."

      # TYPES-REGEN TEMP (LANDING-CUSTOM): emit the generated types from the from-zero
      # schema (incl. 000101's office_hours/tiktok/youtube) as an artifact for the lane
      # to commit verbatim. Reverted before the slice finalizes.
      - name: TYPES-REGEN generate + upload database types
        run: |
          set -euo pipefail
          supabase gen types typescript --local > src/types/database.generated.ts
          echo "--- head ---"; head -12 src/types/database.generated.ts
          echo "--- office_hours present? ---"; grep -c office_hours src/types/database.generated.ts
      - name: TYPES-REGEN upload
        uses: actions/upload-artifact@v4
        with:
          name: database-types
          path: src/types/database.generated.ts
          if-no-files-found: error

      - name: Assert the replay landed (chain + the Phase-0-flagged risks)
        run: |
          set -euo pipefail
          if ! command -v psql >/dev/null 2>&1; then sudo apt-get update -y && sudo apt-get install -y postgresql-client; fi
          DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          q() { psql "$DB_URL" -tA -c "$1"; }

          # (1) every migration recorded (63 files in supabase/migrations).
          EXPECTED=$(ls supabase/migrations/*.sql | wc -l | tr -d ' ')
          APPLIED=$(q "select count(*) from supabase_migrations.schema_migrations;")
          echo "migrations applied=${APPLIED} expected=${EXPECTED}"
          [ "${APPLIED}" -ge "${EXPECTED}" ] || { echo "::error::only ${APPLIED}/${EXPECTED} migrations recorded"; exit 1; }

          # (2) RISK — direct auth.users inserts (000008 demo accounts; the GUC fix).
          # 4 base logins from 000008 (owner/coach/reception/student) + 1 from 000066
          # (the demo guardian, Samer Mourad / guardian@prolinegym.lb) = 5 from zero.
          USERS=$(q "select count(*) from auth.users where email like '%@prolinegym.lb';")
          echo "auth.users demo logins (@prolinegym.lb)=${USERS}"
          [ "${USERS}" -eq 5 ] || { echo "::error::expected 5 demo auth.users (4 from 000008 + the 000066 demo guardian), got ${USERS} — the app.demo_password replay path regressed"; exit 1; }

          # (3) RISK — storage buckets + RLS policies (000039 avatars, 000061 drafts).
          BUCKETS=$(q "select count(*) from storage.buckets where id in ('avatars','coach-avatar-drafts');")
          POLICIES=$(q "select count(*) from pg_policies where schemaname='storage' and tablename='objects';")
          echo "storage buckets(avatars,coach-avatar-drafts)=${BUCKETS}  storage.objects policies=${POLICIES}"
          [ "${BUCKETS}" -eq 2 ] || { echo "::error::expected 2 storage buckets (000039/000061), got ${BUCKETS}"; exit 1; }
          [ "${POLICIES}" -ge 1 ] || { echo "::error::no storage.objects RLS policies applied (000039)"; exit 1; }

          # (4) sanity — the migration chain's base seed (000006 proline-gym) is present.
          GYM=$(q "select count(*) from gyms where slug='proline-gym';")
          [ "${GYM}" -eq 1 ] || { echo "::error::base seed gym 'proline-gym' (000006) missing"; exit 1; }

          echo "✅ Phase 0b: replay-check GREEN — chain replays from zero; auth.users + storage risks confirmed applied."

      - name: Assert every gym_id-bearing table's RLS is gym-scoped (CATALOG-SCOPE guard)
        run: |
          set -euo pipefail
          if ! command -v psql >/dev/null 2>&1; then sudo apt-get update -y && sudo apt-get install -y postgresql-client; fi
          DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          # occurrence-#5 insurance (CATALOG-SCOPE / 000088): a role-only
          # `auth.role() = 'authenticated'` read on ANY gym_id-bearing public table — the
          # cross-tenant blanket-RLS leak class fixed by 000085 (class_schedules) + 000088
          # (the 6 catalog tables) — RAISEs and fails this job. ON_ERROR_STOP=1 → the
          # RAISE EXCEPTION exits psql non-zero. The SQL also prints every candidate
          # policy's qual + verdict for the run log.
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/ci/assert-gym-scoped-policies.sql
          echo "✅ CATALOG-SCOPE guard GREEN — no gym_id-bearing table carries a blanket authenticated read."

      - name: Assert the role helpers follow profiles.gym_id (AUTH-PRIMITIVES proof)
        run: |
          set -euo pipefail
          if ! command -v psql >/dev/null 2>&1; then sudo apt-get update -y && sudo apt-get install -y postgresql-client; fi
          DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          # AUTH-PRIMITIVES (000089): get_user_role() + is_gym_admin() must resolve a
          # multi-gym identity's role/admin from its CURRENT gym (profiles.gym_id), not
          # an arbitrary gym. The SQL seeds a 2-gym identity, impersonates it, and RAISEs
          # (→ psql exits non-zero under ON_ERROR_STOP=1) if role/admin don't flip with
          # profiles.gym_id. All in a ROLLBACK'd transaction — no persisted test data.
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/ci/assert-auth-primitives.sql
          echo "✅ AUTH-PRIMITIVES proof GREEN — role + admin scope to profiles.gym_id."

      - name: Assert every SECURITY DEFINER function's EXECUTE posture (DEFINER-POSTURE guard)
        run: |
          set -euo pipefail
          if ! command -v psql >/dev/null 2>&1; then sudo apt-get update -y && sudo apt-get install -y postgresql-client; fi
          DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          # AUTH-DEPTH (000096): a SECURITY DEFINER function bypasses RLS, so who may
          # EXECUTE it is access control. This guard RAISEs (→ psql exits non-zero under
          # ON_ERROR_STOP=1) if any public definer function is PUBLIC-executable (V1),
          # lacks a pinned search_path (V2), or grants EXECUTE to anon while off the
          # reviewed landing + RLS-helper allowlist (V3) — the Supabase anon default-
          # privilege that made new staff RPCs anon-callable. Prints the full inventory
          # + verdict per function to the run log.
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/ci/assert-definer-posture.sql
          echo "✅ DEFINER-POSTURE guard GREEN — no PUBLIC/anon leak; every definer function pins search_path."

      - name: Assert the four newly-covered tables are on the audit trail (AUDIT-TRIGGERS proof)
        run: |
          set -euo pipefail
          if ! command -v psql >/dev/null 2>&1; then sudo apt-get update -y && sudo apt-get install -y postgresql-client; fi
          DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          # AUDIT-TRIGGERS (000099): coaches/classes/camps/user_roles carried no audit
          # trigger — staff could mutate them (incl. privilege grants on user_roles) with
          # no trail. This proof INSERT/UPDATE/DELETEs a throwaway row in each of the four
          # tables and RAISEs (→ psql exits non-zero under ON_ERROR_STOP=1) if any of the
          # create/update/delete audit_logs rows is missing. All in a ROLLBACK'd txn — no
          # persisted test data. Dropping any of the four triggers turns this step red.
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/ci/assert-audit-triggers.sql
          echo "✅ AUDIT-TRIGGERS proof GREEN — coaches/classes/camps/user_roles each write create+update+delete audit rows."

      - name: Stop the local stack
        if: always()
        run: supabase stop --no-backup || true
