# MONEY-TALLY R1 — TEMPORARY diagnostic workflow (branch-only scaffolding).
#
# Stands up the SAME stack the e2e gate uses (supabase start → db reset → API-role
# grants → seed_e2e_gym per worker slot) and runs scripts/diag/money-tally-explain.sql
# against it, so the EXPLAIN plans in the MONEY-TALLY evidence come from the gate's own
# stack rather than a developer laptop.
#
# It touches NO gate configuration: separate workflow, manual dispatch only, and it is
# DELETED before the slice's final tip.
name: MONEY-TALLY explain (temporary diagnostic)

on:
  workflow_dispatch:
    inputs:
      gyms:
        description: 'How many gyms to seed into the ONE database (the union seeds one per worker slot).'
        type: string
        required: false
        default: '4'

jobs:
  explain:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -y && sudo apt-get install -y postgresql-client
          fi

      - name: Install the Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Start the isolated local Supabase stack (Docker)
        run: supabase start

      - name: Replay ALL migrations from zero
        run: supabase db reset

      - name: Capture the stack URL + keys
        run: |
          set -euo pipefail
          supabase status -o env > /tmp/sb.env
          set -a; . /tmp/sb.env; set +a
          echo "SUPABASE_DB_URL=${DB_URL}" >> "$GITHUB_ENV"

      - name: Grant API-role privileges (local-stack parity with cloud)
        run: |
          set -euo pipefail
          : "${SUPABASE_DB_URL:?}"
          psql "${SUPABASE_DB_URL}" -v ON_ERROR_STOP=1 <<'SQL'
          GRANT USAGE ON SCHEMA public TO anon, authenticated, service_role;
          GRANT SELECT ON ALL TABLES IN SCHEMA public TO anon;
          GRANT ALL ON ALL TABLES IN SCHEMA public TO authenticated, service_role;
          GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO anon, authenticated, service_role;
          SQL

      - name: Seed one gym per worker slot (the union's shape)
        run: |
          set -euo pipefail
          for w in $(seq 0 $(( ${{ inputs.gyms }} - 1 ))); do
            psql "${SUPABASE_DB_URL}" -v ON_ERROR_STOP=1 -tAc \
              "select seed_e2e_gym('mt-diag-w${w}', 'E2eTestPass!23');" >/dev/null
            echo "✅ seeded mt-diag-w${w}"
          done

      - name: EXPLAIN the cash-drawer read (before / after)
        run: psql "${SUPABASE_DB_URL}" -f scripts/diag/money-tally-explain.sql
