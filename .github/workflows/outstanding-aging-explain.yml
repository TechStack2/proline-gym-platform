# OUTSTANDING-AGING R1 — TEMPORARY diagnostic (branch-only scaffolding).
# Stands up the SAME stack the e2e gate uses and runs the aging reproduction + EXPLAIN
# on the gate's own stack with a staff JWT. push-triggered (a brand-new workflow_dispatch
# 404s off the default branch). DELETED before the slice's final tip.
name: OUTSTANDING-AGING explain (temporary diagnostic)

on:
  push:
    branches: [prompt-outstanding-aging]
    paths:
      - 'scripts/diag/outstanding-aging-explain.sql'
      - '.github/workflows/outstanding-aging-explain.yml'

jobs:
  explain:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -y && sudo apt-get install -y postgresql-client
          fi
      - name: Install the Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Start the isolated local Supabase stack (Docker)
        run: supabase start
      - name: Replay ALL migrations from zero
        run: supabase db reset
      - name: Capture the stack URL + keys
        run: |
          set -euo pipefail
          supabase status -o env > /tmp/sb.env
          set -a; . /tmp/sb.env; set +a
          echo "SUPABASE_DB_URL=${DB_URL}" >> "$GITHUB_ENV"
      - name: Grant API-role privileges (local-stack parity with cloud)
        run: |
          set -euo pipefail
          : "${SUPABASE_DB_URL:?}"
          psql "${SUPABASE_DB_URL}" -v ON_ERROR_STOP=1 <<'SQL'
          GRANT USAGE ON SCHEMA public TO anon, authenticated, service_role;
          GRANT SELECT ON ALL TABLES IN SCHEMA public TO anon;
          GRANT ALL ON ALL TABLES IN SCHEMA public TO authenticated, service_role;
          GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO anon, authenticated, service_role;
          SQL
      - name: Seed a gym
        run: |
          set -euo pipefail
          psql "${SUPABASE_DB_URL}" -v ON_ERROR_STOP=1 -tAc \
            "select seed_e2e_gym('age-diag-w0', 'E2eTestPass!23');" >/dev/null
          echo "✅ seeded age-diag-w0"
      - name: Reproduce + EXPLAIN
        run: psql "${SUPABASE_DB_URL}" -f scripts/diag/outstanding-aging-explain.sql
