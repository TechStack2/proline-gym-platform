name: Verify Foundation (F1)

# Applies pending migrations to the linked Supabase project and proves the
# identity chain via the reproduce query — using the Supabase Management API
# with a revocable ACCESS TOKEN only (no DB password, no service-role key).
#
# Setup (one time):
#   1. Create a Supabase access token: https://supabase.com/dashboard/account/tokens
#   2. Repo → Settings → Secrets and variables → Actions → New repository secret
#        Name: SUPABASE_ACCESS_TOKEN   Value: <the token>
#   3. Actions → "Verify Foundation (F1)" → Run workflow.
#        - Leave "apply" = false first to DIAGNOSE the DB state.
#        - Then run again with apply = true and the right "migrations" list.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply the migrations (false = diagnose only)'
        type: boolean
        default: false
      migrations:
        description: 'Space-separated migration basenames to apply, in order'
        type: string
        default: '000010_add_belt_columns 000011_fix_rls_gym_scoping 000012_create_pt_assignments 000013_fix_rental_bookings_rls 000014_fix_pt_rls_gym_scoping 000015_notifications_producer_rls 000016_pt_request_workflow 000017_foundation_identity 000018_student_identity_write_path 000019_demo_single_session_pt_package 000020_gym_coaches_reader 000021_pt_approval_notifications'

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      DO_APPLY: ${{ inputs.apply }}
      MIGRATIONS: ${{ inputs.migrations }}
    steps:
      - uses: actions/checkout@v4

      - name: Diagnose + (optionally) apply + prove
        run: |
          set -uo pipefail
          : "${PROJECT_REF:=ufpuebfkcpohwubrutff}"
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set."
            exit 1
          fi
          API="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"

          run_sql() { # $1=label ; SQL from stdin
            local label="$1"; local sql; sql="$(cat)"
            local body; body="$(jq -Rs '{query: .}' <<<"$sql")"
            echo "::group::${label}"
            local code; code="$(curl -sS -o /tmp/resp.json -w '%{http_code}' -X POST "$API" \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" --data-binary "$body")"
            jq . /tmp/resp.json 2>/dev/null || cat /tmp/resp.json
            echo "(HTTP ${code})"; echo "::endgroup::"
            [ "${code}" -lt 400 ]
          }

          REPRODUCE="select u.email, p.id as profile_id, p.gym_id
                     from auth.users u left join profiles p on p.id = u.id
                     where u.email like '%@prolinegym.lb' order by u.email;"

          echo "===== DIAGNOSE: recorded migrations ====="
          run_sql "schema_migrations" <<'SQL'
          select case
            when to_regclass('supabase_migrations.schema_migrations') is null then 'NO_MIGRATIONS_TABLE'
            else (select coalesce(string_agg(version, ',' order by version), 'EMPTY')
                  from supabase_migrations.schema_migrations)
          end as applied_versions;
          SQL

          echo "===== DIAGNOSE: key relations present? (null = missing) ====="
          run_sql "relations" <<'SQL'
          select to_regclass('public.pt_assignments') as pt_assignments,
                 to_regclass('public.pt_packages')    as pt_packages,
                 to_regclass('public.leads')          as leads,
                 to_regclass('public.trial_classes')  as trial_classes,
                 to_regclass('public.notifications')  as notifications,
                 to_regclass('public.belt_promotions') as belt_promotions;
          SQL

          run_sql "notifications producer columns (000015 marker)" <<'SQL'
          select string_agg(column_name, ',') as cols
          from information_schema.columns
          where table_schema='public' and table_name='notifications'
            and column_name in ('gym_id','type','title_key','params');
          SQL

          echo "===== BEFORE: reproduce identity chain ====="
          run_sql "BEFORE reproduce" <<< "$REPRODUCE"

          echo "===== F2-A DIAG: function owners + EXECUTE grants ====="
          run_sql "F2 function privileges" <<'SQL'
          select p.proname,
                 pg_get_userbyid(p.proowner) as owner,
                 p.prosecdef as security_definer,
                 p.proconfig as config,
                 coalesce(array_to_string(p.proacl::text[], ' | '), 'NULL(=default PUBLIC EXECUTE)') as acl
          from pg_proc p
          join pg_namespace n on n.oid = p.pronamespace
          where n.nspname = 'public'
            and p.proname in ('recipient_in_gym','is_staff','get_user_gym_id','get_user_role','pt_emit_approved_notifications')
          order by p.proname;
          SQL

          run_sql "F2 notifications INSERT policy (live)" <<'SQL'
          select polname,
                 pg_get_expr(polqual, polrelid)      as using_expr,
                 pg_get_expr(polwithcheck, polrelid) as with_check_expr,
                 polcmd
          from pg_policy
          where polrelid = 'public.notifications'::regclass
          order by polname;
          SQL

          run_sql "F2 recipient_in_gym(student profile, owner gym) as admin" <<'SQL'
          with s as (
            select p.id as student_profile, p.gym_id
            from auth.users u join profiles p on p.id = u.id
            where u.email = 'student@prolinegym.lb'
          )
          select s.student_profile, s.gym_id, public.recipient_in_gym(s.student_profile, s.gym_id) as recip_ok
          from s;
          SQL

          if [ "${DO_APPLY}" != "true" ]; then
            echo "Diagnose-only run (apply=false). Re-run with apply=true once the migration list is confirmed."
            exit 0
          fi

          echo "===== APPLY: ${MIGRATIONS} ====="
          for m in ${MIGRATIONS}; do
            f="supabase/migrations/${m}.sql"
            if [ ! -f "$f" ]; then echo "::error::missing $f"; exit 1; fi
            run_sql "apply ${m}" < "$f" || { echo "::error::apply ${m} failed"; exit 1; }
            # Record in the migration ledger so a later `supabase db push` is consistent.
            ver="${m%%_*}"
            run_sql "record ${ver}" <<SQL || true
          insert into supabase_migrations.schema_migrations(version)
          values ('${ver}') on conflict (version) do nothing;
          SQL
          done

          echo "===== AFTER: reproduce identity chain (expect 4 profiles WITH gym_id) ====="
          run_sql "AFTER reproduce" <<< "$REPRODUCE" || exit 1

          echo "===== Per-portal DATA proof (admin context) ====="
          run_sql "owner/reception -> students in gym" <<'SQL'
          select pr.first_name_en as student, s.current_belt_rank
          from students s
          join profiles pr on pr.id = s.profile_id
          join gyms g on g.id = s.gym_id
          where g.slug = 'proline-gym' and s.is_active;
          SQL

          run_sql "student@ -> schedule + belt + invoice" <<'SQL'
          select 'enrollment' as kind, c.name_en as detail
          from class_enrollments ce
          join classes c on c.id = ce.class_id
          join students s on s.id = ce.student_id
          join profiles p on p.id = s.profile_id
          join auth.users u on u.id = p.id
          where u.email = 'student@prolinegym.lb'
          union all
          select 'belt', bp.to_rank::text
          from belt_promotions bp
          join students s on s.id = bp.student_id
          join profiles p on p.id = s.profile_id
          join auth.users u on u.id = p.id
          where u.email = 'student@prolinegym.lb'
          union all
          select 'invoice', coalesce(i.invoice_number,'(pending#)') || ' $' || i.total_usd
          from invoices i
          join students s on s.id = i.student_id
          join profiles p on p.id = s.profile_id
          join auth.users u on u.id = p.id
          where u.email = 'student@prolinegym.lb';
          SQL

          run_sql "coach@ -> own class + roster" <<'SQL'
          select c.name_en as class, pr.first_name_en as student
          from classes c
          join coaches co on co.id = c.coach_id
          join profiles cp on cp.id = co.profile_id
          join auth.users cu on cu.id = cp.id
          left join class_enrollments ce on ce.class_id = c.id and ce.is_active
          left join students s on s.id = ce.student_id
          left join profiles pr on pr.id = s.profile_id
          where cu.email = 'coach@prolinegym.lb';
          SQL

          echo "✅ Verification complete — see BEFORE/AFTER groups above."
