name: Lint + Unit (isolated guards)

# FORM-FOCUS-SWEEP: a standalone, ISOLATED guard (does NOT touch the e2e gate, so it can't
# destabilize it) that fails if any component is defined inside a render body
# (react/no-unstable-nested-components) — the recurring per-keystroke input-focus-loss bug
# (a nested component gets a new type each render → React remounts it → the cursor drops).
# Focused grep so it fails ONLY on that rule, not on the repo's other pre-existing
# next-lint findings (the eslint config is .eslintrc.json).
#
# CI-HYGIENE: the vitest unit suites (rate-limit.test.ts, invite.test.ts — the auth/security
# guards) previously ran only locally. The unit-tests job gates PRs here, ISOLATED from the
# e2e workflow (same rationale: it can't destabilize the behavior gate).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  no-unstable-nested-components:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Guard react/no-unstable-nested-components
        run: |
          out="$(npx next lint --dir src --format compact 2>&1 || true)"
          if echo "$out" | grep -q "no-unstable-nested-components"; then
            echo "::error::A component is defined inside a render body — React remounts it every render, so inputs lose focus per keystroke. Hoist it to MODULE SCOPE (pass data as props). Offending locations:"
            echo "$out" | grep "no-unstable-nested-components"
            exit 1
          fi
          echo "✓ no unstable nested components"

  # DS2-TOKENS §1.1: the color-literal ban. Its own job, for the same isolation reason as
  # the others — it fails ONLY on color literals, never on the repo's pre-existing
  # next-lint findings, so it can be a hard gate from day one instead of "someday".
  color-literals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Guard the §1.1 literal ban (no raw hex outside the token files)
        run: node scripts/lint-color-literals.mjs

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Vitest unit suites (auth rate-limit + invite security guards, billing units)
        run: npx vitest run
