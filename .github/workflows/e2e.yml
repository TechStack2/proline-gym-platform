name: E2E Verification (behavior-green gate)

# ISO-DB Phase 1 — each run boots its OWN isolated LOCAL Supabase stack on the
# runner (Postgres + GoTrue + Storage + PostgREST via Docker), replays all
# migrations from zero (`supabase db reset`, proven clean by db-replay-check),
# and seeds ONE gym per worker slot. The app + Playwright point at localhost, so
# e2e never touches the shared CLOUD project (that stays prod/VF-only). This kills
# the cloud-latency flakes (off2/off3b/b3) at the root AND lets runs go concurrent
# + parallel (workers = runner cores) — the #1 CI-cost lever.
#
# No cloud secrets are needed here: the local stack mints its own anon/service
# keys (captured from `supabase status`). WHATSAPP runs in record mode.

on:
  # E2E-TIERED — branch validation can run a FAST TARGETED subset; the push-to-main
  # union gate below always runs the FULL suite (unchanged).
  #   • Targeted:  gh workflow run e2e.yml --ref <branch> -f projects="<slice-project>"
  #                → runs setup + smoke + <those projects> only.
  #   • Full:      gh workflow run e2e.yml --ref <branch>           (empty `projects`)
  #                → runs the FULL suite (same as push-to-main).
  workflow_dispatch:
    inputs:
      # STABILIZE-3: extra args appended to `playwright test` (e.g. an isolated
      # "--project=off2 --repeat-each=3" stability proof). Works on both paths below.
      pw_args:
        description: 'Extra args appended to `playwright test` (e.g. "--project=off2 --repeat-each=3"). Empty = no extra args.'
        type: string
        required: false
        default: ''
      # E2E-TIERED: a TARGETED run (setup + smoke + these projects). Empty = FULL.
      projects:
        description: 'Space-separated playwright projects for a TARGETED run (setup + smoke are always included). Empty = FULL suite.'
        type: string
        required: false
        default: ''
      # CI-LOCAL: opt-in self-hosted runner. INERT by default — 'hosted' keeps the
      # unchanged GitHub ubuntu-latest path; 'self' targets a 'self-hosted'-labelled
      # runner (e.g. the owner's Mac). SELF-HOST ON PRIVATE REPOS ONLY — a public-repo
      # self-hosted runner lets fork PRs run arbitrary code on your machine. See
      # docs/ci/self-hosted-runner.md before using.
      runner:
        description: 'Runner: hosted (GitHub ubuntu-latest, default) | self (opt-in self-hosted; PRIVATE repos only)'
        type: choice
        options: [hosted, self]
        required: false
        default: hosted
  push:
    branches: [main]
    paths-ignore:           # auditor docs land on main constantly — don't burn
      - 'docs/**'           # a runner on them
      - '**.md'

# ISO-DB: the per-run LOCAL stack makes runs independent — the old global
# `concurrency: e2e-cloud` serial lock (every run across every ref queued behind
# the shared cloud project) is GONE. Different refs now run CONCURRENTLY. On a
# non-`main` ref a newer push supersedes the in-flight run (cost); `main` is never
# cancelled, so the union gate always finishes (incl. its stack teardown).
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  e2e:
    # CI-LOCAL: default ubuntu-latest (UNCHANGED). The `runner` dispatch input can
    # opt into a self-hosted runner; on `push` (the union gate) inputs.runner is
    # empty → the expression resolves to ubuntu-latest, so the default is inert.
    runs-on: ${{ (inputs.runner == 'self' && 'self-hosted') || 'ubuntu-latest' }}
    timeout-minutes: 45
    env:
      # G1: WhatsApp dispatch runs in RECORD mode under CI (no external Meta call;
      # the outbound queue is written so routing is verifiable). The enc key is a
      # CI test value (record mode sends nothing); prod uses a real secret.
      WHATSAPP_PROVIDER_MODE: record
      WHATSAPP_TOKEN_ENC_KEY: 'ci-test-enc-key-not-a-secret'
      # Run-scoped login password (matches the seed default; a test value, not a secret).
      E2E_PASSWORD: 'E2eTestPass!23'
      # ISO-DB: disable the per-IP auth rate limit for this run only — 4×5 logins
      # from one CI IP would otherwise 429 the login page. NEVER set in prod.
      E2E_TEST_MODE: '1'
      # LOGIN-LIMITER: high pure-IP ceiling for the harness (belt-and-suspenders with
      # E2E_TEST_MODE above — all suite traffic shares the runner IP; GoTrue-limit
      # bypass precedent). The per-IDENTIFIER limit is deliberately NOT raised, so
      # login-limiter.spec exercises the real 5/min-per-account posture.
      AUTH_RATE_LIMIT_PER_IP: '1000'
      # SCHEDULER-WIRE: a CI test value so /api/cron/dunning is ACTIVE for the guard
      # (UNSET in prod by default → the route is inert 204). Not a real secret.
      CRON_SECRET: 'e2e-cron-secret-not-a-real-secret'
      # Worker slots = isolated gyms seeded below = playwright.config WORKERS. One source.
      # ISO-DB: a single `next start` app server backs all workers. workers:4
      # saturated it and flaked write-heavy multi-step flows (disabled submit
      # buttons / missing success markers under slow hydration); workers:2 is the
      # stable parallel level (125/130 green, ~26.6m vs ~43m serial). Pushing to
      # 3–4 (the ≤15m goal) needs the single app server's contention addressed
      # (e.g. clustering `next start`). See docs/audit Cycle 6 / ISO-DB.
      E2E_WORKERS: '2'
      NEXT_PUBLIC_DEFAULT_LOCALE: en
      NEXT_PUBLIC_SUPPORTED_LOCALES: ar,en,fr
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install psql client (seed via the SECURITY DEFINER fn as postgres)
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -y && sudo apt-get install -y postgresql-client
          fi

      - name: Install the Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Cache the Playwright browser download (the ~100MB chromium) across runs.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Start the isolated local Supabase stack (Docker)
        run: supabase start

      - name: Replay ALL migrations from zero (clean state; proven by db-replay-check)
        run: supabase db reset

      - name: Capture the local stack URL + keys
        run: |
          set -euo pipefail
          supabase status -o env > /tmp/sb.env
          set -a; . /tmp/sb.env; set +a
          BASE="e2e-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=${API_URL}"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}"
            echo "SUPABASE_DB_URL=${DB_URL}"
            echo "E2E_GYM_SLUG_BASE=${BASE}"
          } >> "$GITHUB_ENV"
          echo "local stack ready at ${API_URL}; gym base=${BASE}; workers=${E2E_WORKERS}"

      - name: Grant API-role privileges (local-stack parity with cloud)
        # ISO-DB: Supabase CLOUD auto-grants anon/authenticated table privileges
        # out-of-band (platform default privileges) — they are NOT in the migrations.
        # A from-zero LOCAL replay therefore has the schema + RLS but no API-role
        # GRANTs, so every app read 42501s ("permission denied for table …") and the
        # gym renders empty. Re-apply the standard Supabase grants (RLS still governs
        # which ROWS each role sees; tables without an anon policy stay anon-invisible).
        # Runs AFTER the capture step (which sets SUPABASE_DB_URL).
        run: |
          set -euo pipefail
          : "${SUPABASE_DB_URL:?}"
          psql "${SUPABASE_DB_URL}" -v ON_ERROR_STOP=1 <<'SQL'
          GRANT USAGE ON SCHEMA public TO anon, authenticated, service_role;
          GRANT SELECT ON ALL TABLES IN SCHEMA public TO anon;
          GRANT ALL ON ALL TABLES IN SCHEMA public TO authenticated, service_role;
          GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO anon, authenticated, service_role;
          -- Storage parity (avatar uploads): same out-of-band grant gap on the
          -- storage schema → uploads land 0 bytes / fail on local.
          GRANT USAGE ON SCHEMA storage TO anon, authenticated, service_role;
          GRANT ALL ON storage.objects, storage.buckets TO authenticated, service_role;
          GRANT SELECT ON storage.objects, storage.buckets TO anon;
          SQL
          echo "✅ API-role grants applied (public + storage; RLS still governs rows)"

      - name: Seed one ISOLATED gym per worker slot (<base>-w0 … w<N-1>)
        run: |
          set -euo pipefail
          for w in $(seq 0 $((E2E_WORKERS - 1))); do
            SLUG="${E2E_GYM_SLUG_BASE}-w${w}"
            psql "${SUPABASE_DB_URL}" -v ON_ERROR_STOP=1 -tAc \
              "select seed_e2e_gym('${SLUG}', '${E2E_PASSWORD}');" >/dev/null
            echo "✅ seeded ${SLUG}"
          done

      - run: npm ci

      - name: Install Playwright browser (cached)
        run: npx playwright install --with-deps chromium

      - name: Build (bakes NEXT_PUBLIC_* → the local stack)
        run: npm run build

      - name: Run E2E harness
        env:
          # Both set only on workflow_dispatch; empty for `push` (the union gate) → FULL.
          E2E_PROJECTS: ${{ inputs.projects }}   # E2E-TIERED targeted subset
          PW_ARGS: ${{ inputs.pw_args }}         # STABILIZE-3 extra playwright args
        run: |
          set -uo pipefail
          if [ -n "${E2E_PROJECTS// /}" ]; then
            # ── TARGETED branch run: setup + smoke + the named projects (+ any pw_args) ──
            # E2E_TIERED=1 makes the `smoke` project materialize (see playwright.config.ts).
            ARGS="--project=setup --project=smoke"
            for p in ${E2E_PROJECTS}; do ARGS="$ARGS --project=$p"; done
            echo "▶ TARGETED run: setup + smoke + [${E2E_PROJECTS}] ${PW_ARGS}"
            E2E_TIERED=1 npx playwright test $ARGS ${PW_ARGS}
          else
            # ── FULL union gate (push-to-main + bare dispatch): the regression guard,
            #    every project, UNCHANGED. No E2E_TIERED → no `smoke` project added. ──
            echo "▶ FULL union gate (all projects) ${PW_ARGS}"
            npm run test:e2e -- ${PW_ARGS}
          fi

      # ── FK proof (now LOCAL): a notification to a LOGIN-LESS member persists
      #    (000032 FK → profiles). Runs against worker-slot 0's gym. Pre-000032 the
      #    direct INSERT errors 23503 (→auth.users); post-fix it succeeds.
      - name: Verify login-less member notifications persist (FK → profiles)
        if: ${{ inputs.projects == '' }}
        run: |
          set -euo pipefail
          SLUG="${E2E_GYM_SLUG_BASE}-w0"
          OUT="$(psql "${SUPABASE_DB_URL}" -v ON_ERROR_STOP=1 -v slug="${SLUG}" -tA -F'|' <<'SQL'
          WITH g AS (SELECT id FROM gyms WHERE slug = :'slug'),
          ll AS (
            SELECT p.id FROM profiles p JOIN g ON g.id = p.gym_id
            LEFT JOIN auth.users u ON u.id = p.id
            WHERE u.id IS NULL LIMIT 1
          ),
          ins AS (
            INSERT INTO notifications (user_id, gym_id, type, title_key, body_key, params, entity_type)
            SELECT ll.id, g.id, 'invoice_issued', 'messages.invoice_issued.title', 'messages.invoice_issued.body', '{}'::jsonb, 'invoice'
            FROM ll, g RETURNING 1
          )
          SELECT
            (SELECT confrelid::regclass::text FROM pg_constraint
               WHERE conname='notifications_user_id_fkey' AND conrelid='notifications'::regclass),
            (SELECT count(*) FROM ins),
            (SELECT count(*) FROM notifications n
               JOIN profiles p ON p.id = n.user_id JOIN g ON g.id = p.gym_id
               LEFT JOIN auth.users u ON u.id = p.id
               WHERE u.id IS NULL
                 AND n.type IN ('invoice_issued','payment_received','lead_converted'));
          SQL
          )"
          echo "fk_target|direct_insert_persisted|loginless_member_notifs = ${OUT}"
          TARGET="$(echo "$OUT" | cut -d'|' -f1)"
          PERSISTED="$(echo "$OUT" | cut -d'|' -f2)"
          if [ "${TARGET}" != "profiles" ]; then echo "::error::FK targets '${TARGET}' (expected profiles)"; exit 1; fi
          if [ "${PERSISTED}" != "1" ]; then echo "::error::login-less notification did NOT persist (pre-fix behavior)"; exit 1; fi
          echo "✅ Login-less notification persistence: PASS (fk→profiles; direct insert persisted)"

      # ── REG-FIX proof (now LOCAL): registering a member to a class SUCCEEDS even
      #    when a staff notify recipient (a receptionist user_role) has NO profiles
      #    row. Pre-000065 the un-guarded class_requested fan-out FK-violates (23503)
      #    and rolls back the whole registration; post-fix it succeeds. Slot-0 gym.
      - name: Verify class registration survives a profile-less staff notify recipient (REG-FIX)
        if: ${{ inputs.projects == '' }}
        run: |
          set -euo pipefail
          SLUG="${E2E_GYM_SLUG_BASE}-w0"
          {
            echo "select set_config('e2e.slug', '${SLUG}', false);"
            cat <<'SQL'
          DO $$
          DECLARE
            v_gym uuid; v_owner uuid; v_disc uuid; v_coach uuid; v_student uuid;
            v_orphan uuid; v_class uuid; v_reg class_registrations; v_status text; v_inv uuid;
            v_slug text := current_setting('e2e.slug');
          BEGIN
            SELECT id INTO v_gym FROM gyms WHERE slug = v_slug;
            IF v_gym IS NULL THEN RAISE EXCEPTION 'run gym % not found', v_slug; END IF;
            SELECT user_id INTO v_owner FROM user_roles WHERE gym_id=v_gym AND role='owner' LIMIT 1;
            SELECT id INTO v_disc FROM disciplines WHERE gym_id=v_gym ORDER BY sort_order LIMIT 1;
            SELECT id INTO v_coach FROM coaches WHERE gym_id=v_gym AND is_active=true ORDER BY created_at LIMIT 1;
            SELECT id INTO v_student FROM students WHERE gym_id=v_gym AND is_active=true ORDER BY created_at LIMIT 1;
            IF v_owner IS NULL OR v_disc IS NULL OR v_coach IS NULL OR v_student IS NULL THEN
              RAISE EXCEPTION 'fixtures missing owner=% disc=% coach=% student=%', v_owner, v_disc, v_coach, v_student;
            END IF;

            -- a dedicated fee-bearing class (deterministic invoice on approve)
            INSERT INTO classes (gym_id, discipline_id, coach_id, name_ar, name_en, name_fr, max_capacity, monthly_fee_usd, is_active)
            VALUES (v_gym, v_disc, v_coach, 'ريج-فيكس', 'REGFIX Proof', 'REGFIX', 10, 30, true)
            RETURNING id INTO v_class;

            -- THE REPRO CONDITION: a STAFF (receptionist) user_role whose user_id has NO profiles row.
            v_orphan := gen_random_uuid();
            INSERT INTO auth.users (instance_id, id, aud, role, email, encrypted_password, email_confirmed_at,
              raw_app_meta_data, raw_user_meta_data, created_at, updated_at, confirmation_token, email_change, email_change_token_new, recovery_token)
            VALUES ('00000000-0000-0000-0000-000000000000', v_orphan, 'authenticated', 'authenticated',
              'regfix-orphan+' || v_slug || '@e2e.local',
              extensions.crypt('x', extensions.gen_salt('bf')), now(),
              '{"provider":"email","providers":["email"]}', jsonb_build_object('gym_id', v_gym::text),
              now(), now(), '', '', '', '');
            DELETE FROM profiles WHERE id = v_orphan;                 -- orphan the FK target (no profiles row)
            INSERT INTO user_roles (user_id, gym_id, role) VALUES (v_orphan, v_gym, 'receptionist');

            -- act as the owner so the SECURITY DEFINER RPC auth gate (is_staff/auth.uid) passes
            PERFORM set_config('request.jwt.claims', json_build_object('sub', v_owner::text, 'role', 'authenticated')::text, true);

            -- previously-failing path: class_requested fans out to owner+receptionist (incl. the orphan)
            v_reg := request_class_registration(v_class, v_student);
            PERFORM approve_class_registration(v_reg.id, 0, 0);

            SELECT status, invoice_id INTO v_status, v_inv FROM class_registrations WHERE id = v_reg.id;
            IF v_status <> 'active' THEN RAISE EXCEPTION 'registration not active (status=%)', v_status; END IF;
            IF v_inv IS NULL OR NOT EXISTS (SELECT 1 FROM invoices WHERE id = v_inv) THEN
              RAISE EXCEPTION 'expected an issued invoice for the registration';
            END IF;
            RAISE NOTICE 'REG-FIX proof OK: reg=% status=% invoice=%', v_reg.id, v_status, v_inv;
          END $$;
          SELECT 'REGFIX_OK' AS proof;
          SQL
          } > /tmp/regfix.sql
          OUT="$(psql "${SUPABASE_DB_URL}" -v ON_ERROR_STOP=1 -tA -f /tmp/regfix.sql)"
          echo "${OUT}"
          if ! echo "${OUT}" | grep -q "REGFIX_OK"; then echo "::error::REG-FIX proof did not confirm"; exit 1; fi
          echo "✅ REG-FIX: class registration succeeds with a profile-less staff notify recipient (active reg + invoice issued)"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: screenshots/
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Stop the local stack
        if: always()
        run: supabase stop --no-backup || true
