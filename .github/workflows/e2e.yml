name: E2E Verification (behavior-green gate)

# Builds the app and runs the Playwright harness against an EPHEMERAL per-run gym
# (Test-Infra hardening): a fresh, fully-seeded gym is provisioned before the
# build and torn down after, so the suite never depends on accumulated shared
# state and the demo `proline-gym` is never touched. Uploads screenshots + the
# HTML report as artifacts.
#
# Required repo secrets:
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY   (public client config)
#   SUPABASE_ACCESS_TOKEN  (Management API — provision/teardown; revoke post-demo)
# Required repo variable: SUPABASE_PROJECT_REF (falls back to the known ref)

on:
  workflow_dispatch:
    inputs:
      pw_args:
        description: 'Extra args appended to `playwright test` (e.g. "--project=off2 --repeat-each=3" for an isolated stability proof). Empty = full suite.'
        type: string
        default: ''
  push:
    branches: [main]
    paths-ignore:           # auditor docs land on main constantly — don't burn
      - 'docs/**'           # an e2e-cloud slot (and queue position) on them
      - '**.md'

# Serialize runs on the shared cloud project; the slug is unique per run/attempt
# regardless, so overlapping runs never collide on data. Don't cancel in-progress
# runs — let each finish so its teardown runs.
concurrency:
  group: e2e-cloud
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      # Management API token (already a repo secret) — used by the ephemeral-gym
      # provision/teardown steps. Revoke in the Supabase dashboard once the demo is done.
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # ON-1: the invite/onboarding server actions call the GoTrue admin API from
      # the webServer (next start). Server-only; never NEXT_PUBLIC_.
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # G1: WhatsApp dispatch runs in RECORD mode under CI (no external Meta call;
      # the outbound queue is written so routing is verifiable). The token enc key
      # is a CI test value (record mode sends nothing); prod uses a real secret.
      WHATSAPP_PROVIDER_MODE: record
      WHATSAPP_TOKEN_ENC_KEY: 'ci-test-enc-key-not-a-secret'
      PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      # Run-scoped login password (matches the seed default; a test value, not a secret).
      E2E_PASSWORD: 'E2eTestPass!23'
      NEXT_PUBLIC_DEFAULT_LOCALE: en
      NEXT_PUBLIC_SUPPORTED_LOCALES: ar,en,fr
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Guard — Supabase env present
        run: |
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL}" ] || [ -z "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" ]; then
            echo "::error::Missing NEXT_PUBLIC_SUPABASE_URL / NEXT_PUBLIC_SUPABASE_ANON_KEY secrets."
            exit 1
          fi
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN secret (needed to provision the ephemeral gym)."
            exit 1
          fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "::error::Missing SUPABASE_SERVICE_ROLE_KEY secret (ON-1 invite/onboarding actions need it)."
            exit 1
          fi

      # ── Provision a fresh, isolated gym for THIS run (seed via Management API) ──
      - name: Provision ephemeral e2e gym
        run: |
          set -uo pipefail
          : "${PROJECT_REF:=ufpuebfkcpohwubrutff}"
          SLUG="e2e-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          API="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"
          BODY="$(jq -Rs '{query: .}' <<<"select seed_e2e_gym('${SLUG}', '${E2E_PASSWORD}');")"
          CODE="$(curl -sS -o /tmp/seed.json -w '%{http_code}' -X POST "$API" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" --data-binary "$BODY")"
          jq . /tmp/seed.json 2>/dev/null || cat /tmp/seed.json
          if [ "${CODE}" -ge 400 ]; then echo "::error::provision failed (HTTP ${CODE})"; exit 1; fi
          echo "E2E_GYM_SLUG=${SLUG}" >> "$GITHUB_ENV"
          echo "✅ provisioned ${SLUG}"

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run E2E harness
        # Default (push / no input) runs the full suite unchanged. workflow_dispatch
        # may pass pw_args for an isolated stability proof (STABILIZE-3 repeat-each).
        run: npm run test:e2e -- ${{ inputs.pw_args }}

      # ── FK proof: a notification to a LOGIN-LESS member persists (000032) ──────
      # The suite's leads.spec converts a lead → a login-less member and (via the
      # D1 retrofit) issues them an invoice → fires invoice_issued to a profile
      # with NO auth.users row. Pre-000032 that INSERT failed FK 23503 (→auth.users)
      # and was swallowed. Here, in ADMIN context (Management API), we (a) confirm
      # the FK now targets `profiles`, and (b) directly INSERT a notification to a
      # seeded login-less member and prove it PERSISTS — pre-fix this same INSERT
      # errors 23503; post-fix it succeeds.
      - name: Verify login-less member notifications persist (FK → profiles)
        run: |
          set -uo pipefail
          : "${PROJECT_REF:=ufpuebfkcpohwubrutff}"
          if [ -z "${E2E_GYM_SLUG:-}" ]; then echo "::error::no run gym slug"; exit 1; fi
          API="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"
          SQL="$(cat <<SQL
          WITH g AS (SELECT id FROM gyms WHERE slug = '${E2E_GYM_SLUG}'),
          ll AS (
            SELECT p.id FROM profiles p JOIN g ON g.id = p.gym_id
            LEFT JOIN auth.users u ON u.id = p.id
            WHERE u.id IS NULL LIMIT 1
          ),
          ins AS (
            INSERT INTO notifications (user_id, gym_id, type, title_key, body_key, params, entity_type)
            SELECT ll.id, g.id, 'invoice_issued', 'messages.invoice_issued.title', 'messages.invoice_issued.body', '{}'::jsonb, 'invoice'
            FROM ll, g RETURNING 1
          )
          SELECT
            (SELECT confrelid::regclass::text FROM pg_constraint
               WHERE conname='notifications_user_id_fkey' AND conrelid='notifications'::regclass) AS fk_target,
            (SELECT count(*) FROM ins) AS direct_insert_persisted,
            (SELECT count(*) FROM notifications n
               JOIN profiles p ON p.id = n.user_id JOIN g ON g.id = p.gym_id
               LEFT JOIN auth.users u ON u.id = p.id
               WHERE u.id IS NULL
                 AND n.type IN ('invoice_issued','payment_received','lead_converted')) AS loginless_member_notifs;
          SQL
          )"
          BODY="$(jq -Rs '{query: .}' <<<"$SQL")"
          CODE="$(curl -sS -o /tmp/fk.json -w '%{http_code}' -X POST "$API" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" --data-binary "$BODY")"
          echo "HTTP ${CODE}"; jq . /tmp/fk.json 2>/dev/null || cat /tmp/fk.json
          if [ "${CODE}" -ge 400 ]; then echo "::error::admin query failed (HTTP ${CODE}) — pre-fix the login-less INSERT errors 23503"; exit 1; fi
          TARGET="$(jq -r '.[0].fk_target // empty' /tmp/fk.json 2>/dev/null)"
          PERSISTED="$(jq -r '.[0].direct_insert_persisted // 0' /tmp/fk.json 2>/dev/null)"
          LL="$(jq -r '.[0].loginless_member_notifs // 0' /tmp/fk.json 2>/dev/null)"
          echo "fk_target=${TARGET} direct_insert_persisted=${PERSISTED} loginless_member_notifs=${LL}"
          if [ "${TARGET}" != "profiles" ]; then echo "::error::FK targets '${TARGET}' (expected profiles)"; exit 1; fi
          if [ "${PERSISTED}" != "1" ]; then echo "::error::login-less notification did NOT persist (pre-fix behavior)"; exit 1; fi
          echo "✅ Login-less notification persistence: PASS (fk→profiles; direct insert persisted; ${LL} convert-flow login-less notif(s))"

      # ── REG-FIX proof: registering a member to a class SUCCEEDS even when a staff
      #    notify recipient (a receptionist user_role) has NO profiles row. Pre-000065
      #    the un-guarded class_requested fan-out FK-violates (23503) and rolls back
      #    the whole registration; post-fix (valid-recipient filter + best-effort +
      #    the BEFORE INSERT skip-orphan trigger) it succeeds. Asserts an ACTIVE
      #    registration + an issued invoice. Acts as the owner via request.jwt.claims.
      - name: Verify class registration survives a profile-less staff notify recipient (REG-FIX)
        run: |
          set -uo pipefail
          : "${PROJECT_REF:=ufpuebfkcpohwubrutff}"
          if [ -z "${E2E_GYM_SLUG:-}" ]; then echo "::error::no run gym slug"; exit 1; fi
          API="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"
          SQL="$(cat <<SQL
          DO \$\$
          DECLARE
            v_gym uuid; v_owner uuid; v_disc uuid; v_coach uuid; v_student uuid;
            v_orphan uuid; v_class uuid; v_reg class_registrations; v_status text; v_inv uuid;
          BEGIN
            SELECT id INTO v_gym FROM gyms WHERE slug = '${E2E_GYM_SLUG}';
            IF v_gym IS NULL THEN RAISE EXCEPTION 'run gym % not found', '${E2E_GYM_SLUG}'; END IF;
            SELECT user_id INTO v_owner FROM user_roles WHERE gym_id=v_gym AND role='owner' LIMIT 1;
            SELECT id INTO v_disc FROM disciplines WHERE gym_id=v_gym ORDER BY sort_order LIMIT 1;
            SELECT id INTO v_coach FROM coaches WHERE gym_id=v_gym AND is_active=true ORDER BY created_at LIMIT 1;
            SELECT id INTO v_student FROM students WHERE gym_id=v_gym AND is_active=true ORDER BY created_at LIMIT 1;
            IF v_owner IS NULL OR v_disc IS NULL OR v_coach IS NULL OR v_student IS NULL THEN
              RAISE EXCEPTION 'fixtures missing owner=% disc=% coach=% student=%', v_owner, v_disc, v_coach, v_student;
            END IF;

            -- a dedicated fee-bearing class (deterministic invoice on approve)
            INSERT INTO classes (gym_id, discipline_id, coach_id, name_ar, name_en, name_fr, max_capacity, monthly_fee_usd, is_active)
            VALUES (v_gym, v_disc, v_coach, 'ريج-فيكس', 'REGFIX Proof', 'REGFIX', 10, 30, true)
            RETURNING id INTO v_class;

            -- THE REPRO CONDITION: a STAFF (receptionist) user_role whose user_id has NO profiles row.
            v_orphan := gen_random_uuid();
            INSERT INTO auth.users (instance_id, id, aud, role, email, encrypted_password, email_confirmed_at,
              raw_app_meta_data, raw_user_meta_data, created_at, updated_at, confirmation_token, email_change, email_change_token_new, recovery_token)
            VALUES ('00000000-0000-0000-0000-000000000000', v_orphan, 'authenticated', 'authenticated',
              'regfix-orphan+${E2E_GYM_SLUG}@e2e.local',
              extensions.crypt('x', extensions.gen_salt('bf')), now(),
              '{"provider":"email","providers":["email"]}', jsonb_build_object('gym_id', v_gym::text),
              now(), now(), '', '', '', '');
            DELETE FROM profiles WHERE id = v_orphan;                 -- orphan the FK target (no profiles row)
            INSERT INTO user_roles (user_id, gym_id, role) VALUES (v_orphan, v_gym, 'receptionist');

            -- act as the owner so the SECURITY DEFINER RPC auth gate (is_staff/auth.uid) passes
            PERFORM set_config('request.jwt.claims', json_build_object('sub', v_owner::text, 'role', 'authenticated')::text, true);

            -- previously-failing path: class_requested fans out to owner+receptionist (incl. the orphan)
            v_reg := request_class_registration(v_class, v_student);
            PERFORM approve_class_registration(v_reg.id, 0, 0);

            SELECT status, invoice_id INTO v_status, v_inv FROM class_registrations WHERE id = v_reg.id;
            IF v_status <> 'active' THEN RAISE EXCEPTION 'registration not active (status=%)', v_status; END IF;
            IF v_inv IS NULL OR NOT EXISTS (SELECT 1 FROM invoices WHERE id = v_inv) THEN
              RAISE EXCEPTION 'expected an issued invoice for the registration';
            END IF;
            RAISE NOTICE 'REG-FIX proof OK: reg=% status=% invoice=% (profile-less receptionist present)', v_reg.id, v_status, v_inv;
          END \$\$;
          SELECT 'REGFIX_OK'::text AS proof;
          SQL
          )"
          BODY="$(jq -Rs '{query: .}' <<<"$SQL")"
          CODE="$(curl -sS -o /tmp/regfix.json -w '%{http_code}' -X POST "$API" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" --data-binary "$BODY")"
          echo "HTTP ${CODE}"; jq . /tmp/regfix.json 2>/dev/null || cat /tmp/regfix.json
          if [ "${CODE}" -ge 400 ]; then echo "::error::REG-FIX repro FAILED (HTTP ${CODE}) — registration rolled back on the staff-notify FK"; exit 1; fi
          if [ "$(jq -r '.[0].proof // empty' /tmp/regfix.json 2>/dev/null)" != "REGFIX_OK" ]; then echo "::error::REG-FIX proof did not confirm"; exit 1; fi
          echo "✅ REG-FIX: class registration succeeds with a profile-less staff notify recipient (active reg + invoice issued)"

      # ── Always tear the gym down (zero residue) ───────────────────────────────
      - name: Teardown ephemeral e2e gym
        if: always()
        run: |
          set -uo pipefail
          : "${PROJECT_REF:=ufpuebfkcpohwubrutff}"
          if [ -z "${E2E_GYM_SLUG:-}" ]; then echo "no slug provisioned — skipping teardown"; exit 0; fi
          API="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"
          BODY="$(jq -Rs '{query: .}' <<<"select teardown_e2e_gym('${E2E_GYM_SLUG}');")"
          CODE="$(curl -sS -o /tmp/teardown.json -w '%{http_code}' -X POST "$API" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" --data-binary "$BODY")"
          jq . /tmp/teardown.json 2>/dev/null || cat /tmp/teardown.json
          echo "🧹 torn down ${E2E_GYM_SLUG} (HTTP ${CODE})"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: screenshots/
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
