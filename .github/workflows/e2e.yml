name: E2E Verification (behavior-green gate)

# Builds the app and runs the Playwright harness against an EPHEMERAL per-run gym
# (Test-Infra hardening): a fresh, fully-seeded gym is provisioned before the
# build and torn down after, so the suite never depends on accumulated shared
# state and the demo `proline-gym` is never touched. Uploads screenshots + the
# HTML report as artifacts.
#
# Required repo secrets:
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY   (public client config)
#   SUPABASE_ACCESS_TOKEN  (Management API — provision/teardown; revoke post-demo)
# Required repo variable: SUPABASE_PROJECT_REF (falls back to the known ref)

on:
  workflow_dispatch:
  push:
    branches: [main]

# Serialize runs on the shared cloud project; the slug is unique per run/attempt
# regardless, so overlapping runs never collide on data. Don't cancel in-progress
# runs — let each finish so its teardown runs.
concurrency:
  group: e2e-cloud
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      # Management API token (already a repo secret) — used by the ephemeral-gym
      # provision/teardown steps. Revoke in the Supabase dashboard once the demo is done.
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      # Run-scoped login password (matches the seed default; a test value, not a secret).
      E2E_PASSWORD: 'E2eTestPass!23'
      NEXT_PUBLIC_DEFAULT_LOCALE: en
      NEXT_PUBLIC_SUPPORTED_LOCALES: ar,en,fr
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Guard — Supabase env present
        run: |
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL}" ] || [ -z "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" ]; then
            echo "::error::Missing NEXT_PUBLIC_SUPABASE_URL / NEXT_PUBLIC_SUPABASE_ANON_KEY secrets."
            exit 1
          fi
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN secret (needed to provision the ephemeral gym)."
            exit 1
          fi

      # ── Provision a fresh, isolated gym for THIS run (seed via Management API) ──
      - name: Provision ephemeral e2e gym
        run: |
          set -uo pipefail
          : "${PROJECT_REF:=ufpuebfkcpohwubrutff}"
          SLUG="e2e-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          API="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"
          BODY="$(jq -Rs '{query: .}' <<<"select seed_e2e_gym('${SLUG}', '${E2E_PASSWORD}');")"
          CODE="$(curl -sS -o /tmp/seed.json -w '%{http_code}' -X POST "$API" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" --data-binary "$BODY")"
          jq . /tmp/seed.json 2>/dev/null || cat /tmp/seed.json
          if [ "${CODE}" -ge 400 ]; then echo "::error::provision failed (HTTP ${CODE})"; exit 1; fi
          echo "E2E_GYM_SLUG=${SLUG}" >> "$GITHUB_ENV"
          echo "✅ provisioned ${SLUG}"

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run E2E harness
        run: npm run test:e2e

      # ── Always tear the gym down (zero residue) ───────────────────────────────
      - name: Teardown ephemeral e2e gym
        if: always()
        run: |
          set -uo pipefail
          : "${PROJECT_REF:=ufpuebfkcpohwubrutff}"
          if [ -z "${E2E_GYM_SLUG:-}" ]; then echo "no slug provisioned — skipping teardown"; exit 0; fi
          API="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"
          BODY="$(jq -Rs '{query: .}' <<<"select teardown_e2e_gym('${E2E_GYM_SLUG}');")"
          CODE="$(curl -sS -o /tmp/teardown.json -w '%{http_code}' -X POST "$API" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" --data-binary "$BODY")"
          jq . /tmp/teardown.json 2>/dev/null || cat /tmp/teardown.json
          echo "🧹 torn down ${E2E_GYM_SLUG} (HTTP ${CODE})"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: screenshots/
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
