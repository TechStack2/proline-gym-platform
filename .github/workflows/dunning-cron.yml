# ============================================================================
# SCHEDULER-WIRE — scheduled WhatsApp dunning sweep (DISABLED BY DEFAULT).
#
# This workflow POSTs to /api/cron/dunning, which iterates active gyms and sends
# each opted-in gym's due renewal reminders (idempotent; per-gym WhatsApp bodies).
#
# It does NOTHING until an owner enables it. Two steps to go live:
#   1) Set the repo secret CRON_SECRET (Settings → Secrets and variables → Actions
#      → New repository secret). Set the SAME value in the app's env (Railway) so
#      the route stops being inert. Optionally set APP_URL if the deployment URL
#      differs from the default below.
#   2) Uncomment the `schedule:` trigger below and commit. That turns on the daily
#      run. (Until then only a manual "Run workflow" can trigger it.)
#
# Safety: even fully enabled, the route is INERT unless the app env has a matching
# CRON_SECRET, and each gym still needs auto_dunning_enabled = true (default OFF).
# ============================================================================
name: Dunning cron (disabled by default)

on:
  # STEP 2 — uncomment to enable the daily sweep (06:30 UTC ≈ 09:30 Beirut):
  # schedule:
  #   - cron: '30 6 * * *'
  workflow_dispatch: {} # manual "Run workflow" (safe to keep; does nothing without the secret)

jobs:
  dunning:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger the dunning sweep
        env:
          # STEP 1 — set these repo secrets. APP_URL defaults to the Railway prod host.
          APP_URL: ${{ secrets.APP_URL || 'https://proline-gym-production.up.railway.app' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "${CRON_SECRET}" ]; then
            echo "CRON_SECRET is not set — the route is inert. Set the repo secret (step 1) to enable."
            exit 0
          fi
          echo "POST ${APP_URL}/api/cron/dunning"
          curl -fsS -X POST "${APP_URL}/api/cron/dunning" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{}'
