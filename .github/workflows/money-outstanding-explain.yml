# MONEY-OUTSTANDING R1 — TEMPORARY diagnostic workflow (branch-only scaffolding).
#
# Stands up the SAME stack the e2e gate uses (supabase start → db reset → API-role
# grants → seed_e2e_gym) and runs scripts/diag/money-outstanding-explain.sql against
# it, so the correctness reproduction AND the EXPLAIN plans in the evidence come from
# the gate's own stack with a staff JWT, not a developer laptop.
#
# It touches NO gate configuration: separate workflow, manual dispatch only, DELETED
# before the slice's final tip.
name: MONEY-OUTSTANDING explain (temporary diagnostic)

# push-triggered (scoped to this branch + the diagnostic paths): a brand-new
# workflow_dispatch 404s until it exists on the default branch, so we self-trigger on
# pushes that touch the diagnostic itself. Deleted before the final tip.
on:
  push:
    branches: [prompt-money-outstanding]
    paths:
      - 'scripts/diag/money-outstanding-explain.sql'
      - '.github/workflows/money-outstanding-explain.yml'

jobs:
  explain:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -y && sudo apt-get install -y postgresql-client
          fi

      - name: Install the Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Start the isolated local Supabase stack (Docker)
        run: supabase start

      - name: Replay ALL migrations from zero
        run: supabase db reset

      - name: Capture the stack URL + keys
        run: |
          set -euo pipefail
          supabase status -o env > /tmp/sb.env
          set -a; . /tmp/sb.env; set +a
          echo "SUPABASE_DB_URL=${DB_URL}" >> "$GITHUB_ENV"

      - name: Grant API-role privileges (local-stack parity with cloud)
        run: |
          set -euo pipefail
          : "${SUPABASE_DB_URL:?}"
          psql "${SUPABASE_DB_URL}" -v ON_ERROR_STOP=1 <<'SQL'
          GRANT USAGE ON SCHEMA public TO anon, authenticated, service_role;
          GRANT SELECT ON ALL TABLES IN SCHEMA public TO anon;
          GRANT ALL ON ALL TABLES IN SCHEMA public TO authenticated, service_role;
          GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO anon, authenticated, service_role;
          SQL

      - name: Seed a gym
        run: |
          set -euo pipefail
          psql "${SUPABASE_DB_URL}" -v ON_ERROR_STOP=1 -tAc \
            "select seed_e2e_gym('mo-diag-w0', 'E2eTestPass!23');" >/dev/null
          echo "✅ seeded mo-diag-w0"

      - name: Reproduce the bug + EXPLAIN the reads
        run: psql "${SUPABASE_DB_URL}" -f scripts/diag/money-outstanding-explain.sql
