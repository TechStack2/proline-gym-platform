<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- OFF-4 OFFLINE-DOOR: served by the SW as the document fallback (next-pwa
       fallbacks.document) when an offline navigation hits an UNcached route. A
       static file can't resolve a gym → TENANT-NEUTRAL (DA-59/W2c): neutral dark
       ground, no vendor crimson; the CACHED gym identity (a localStorage stamp the
       authed shells write) supplies the name + monogram when known, and the cached
       locale is the fallback when the requested path carries none. NOTE: /offline.html is
       excluded from the middleware CSP (the `.*\..*` matcher skips dotted paths),
       so this inline <style>/<script> runs with no nonce. -->
  <title>Offline · Front Desk</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #131317;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .container { max-width: 420px; width: 100%; }
    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 72px;
      width: 72px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }
    .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 60px;
      width: 60px;
      border-radius: 50%;
      background: rgba(245,158,11,0.15);
      margin-bottom: 20px;
    }
    .icon svg { width: 30px; height: 30px; color: #f59e0b; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    p { color: #9ca3af; font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
    .scope {
      margin: 20px 0 4px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 14px 16px;
      text-align: left;
    }
    .rtl .scope { text-align: right; }
    .scope-title { color: #e5e7eb; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .scope ul { list-style: none; }
    .scope li { color: #9ca3af; font-size: 13px; line-height: 1.9; display: flex; align-items: center; gap: 8px; }
    .rtl .scope li { flex-direction: row-reverse; }
    .dot { height: 6px; width: 6px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
    .hint { color: #6b7280; font-size: 13px; margin-top: 14px; }
    .actions { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
    a.cta, button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 24px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, opacity 0.2s;
    }
    a.cta { background: #fff; color: #131317; }
    a.cta:hover { opacity: 0.88; }
    button.ghost {
      background: transparent;
      color: #9ca3af;
      border: 1px solid rgba(255,255,255,0.14);
    }
    button.ghost:hover { color: #fff; }
    a.cta svg, button svg { width: 16px; height: 16px; }
    .rtl { direction: rtl; }
  </style>
</head>
<body>
  <div class="container" id="root">
    <div class="logo" id="logo" hidden>PL</div>
    <div id="gym-name" style="color:#e5e7eb;font-size:15px;font-weight:700;margin-bottom:22px;" hidden></div>
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M12 12h.01" />
      </svg>
    </div>
    <h1 id="title">You're offline</h1>
    <p id="desc">The front desk keeps working with saved data. Everything else needs a connection.</p>

    <div class="scope" data-testid="offline-scope">
      <div class="scope-title" id="scope-title">Works offline:</div>
      <ul>
        <li><span class="dot"></span><span id="scope-attendance">Attendance</span></li>
        <li><span class="dot"></span><span id="scope-cash">Cash payments</span></li>
        <li><span class="dot"></span><span id="scope-leads">Walk-in leads</span></li>
      </ul>
    </div>

    <div class="actions">
      <a class="cta" id="desk-link" href="/en/desk" data-testid="offline-desk-link">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 7h18M3 12h18M3 17h18" />
        </svg>
        <span id="desk-cta">Go to the Front Desk</span>
      </a>
      <button class="ghost" onclick="location.reload()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        <span id="retry">Retry</span>
      </button>
    </div>

    <p class="hint" id="hint">Your work syncs automatically when the connection is back.</p>
  </div>
  <script>
    // Detect locale from the REQUESTED path (the fallback serves under the URL the
    // user navigated to, not /offline.html), falling back to en.
    var path = window.location.pathname;
    // W2c/DA-59: the authed shells stamp the user's gym + locale for this door.
    var stamp = null;
    try { stamp = JSON.parse(localStorage.getItem('praxella_offline_identity') || 'null'); } catch (e) {}
    var pathLocale = path.indexOf('/ar') === 0 ? 'ar' : path.indexOf('/fr') === 0 ? 'fr' : (path.indexOf('/en') === 0 ? 'en' : null);
    var locale = pathLocale || (stamp && (stamp.l === 'ar' || stamp.l === 'fr' || stamp.l === 'en') ? stamp.l : 'en');
    // The cached gym name when known; the monogram tile is its fallback marker.
    if (stamp && stamp.n) {
      var nameEl = document.getElementById('gym-name');
      nameEl.textContent = stamp.n; nameEl.hidden = false;
      var logoEl = document.getElementById('logo');
      logoEl.textContent = stamp.n.charAt(0).toUpperCase(); logoEl.hidden = false;
    }
    var isRtl = locale === 'ar';
    if (isRtl) document.getElementById('root').classList.add('rtl');
    document.documentElement.lang = locale;
    if (isRtl) document.documentElement.dir = 'rtl';

    var deskUrl = '/' + locale + '/desk';
    document.getElementById('desk-link').setAttribute('href', deskUrl);

    var strings = {
      ar: {
        title: 'أنت غير متصل بالإنترنت',
        desc: 'مكتب الاستقبال يعمل بالبيانات المحفوظة. كل شيء آخر يتطلب اتصالاً.',
        scopeTitle: 'يعمل دون اتصال:',
        attendance: 'تسجيل الحضور',
        cash: 'الدفعات النقدية',
        leads: 'العملاء المحتملون',
        deskCta: 'اذهب إلى مكتب الاستقبال',
        retry: 'إعادة المحاولة',
        hint: 'تتم مزامنة عملك تلقائياً عند عودة الاتصال.'
      },
      en: {
        title: "You're offline",
        desc: 'The front desk keeps working with saved data. Everything else needs a connection.',
        scopeTitle: 'Works offline:',
        attendance: 'Attendance',
        cash: 'Cash payments',
        leads: 'Walk-in leads',
        deskCta: 'Go to the Front Desk',
        retry: 'Retry',
        hint: 'Your work syncs automatically when the connection is back.'
      },
      fr: {
        title: 'Vous êtes hors ligne',
        desc: "La réception continue de fonctionner avec les données enregistrées. Le reste nécessite une connexion.",
        scopeTitle: 'Fonctionne hors ligne :',
        attendance: 'Présence',
        cash: 'Paiements en espèces',
        leads: 'Prospects au comptoir',
        deskCta: 'Aller à la réception',
        retry: 'Réessayer',
        hint: 'Votre travail se synchronise automatiquement au retour de la connexion.'
      }
    };
    var t = strings[locale] || strings.en;
    document.getElementById('title').textContent = t.title;
    document.getElementById('desc').textContent = t.desc;
    document.getElementById('scope-title').textContent = t.scopeTitle;
    document.getElementById('scope-attendance').textContent = t.attendance;
    document.getElementById('scope-cash').textContent = t.cash;
    document.getElementById('scope-leads').textContent = t.leads;
    document.getElementById('desk-cta').textContent = t.deskCta;
    document.getElementById('retry').textContent = t.retry;
    document.getElementById('hint').textContent = t.hint;
    document.title = t.title;

    // OFF-4 + OFF-PERF (finding 9): forward to the WARMED front desk when it is
    // cached, instead of dead-ending here. The desk is warmed in the OWNER's locale,
    // but this page is served under the REQUESTED path's locale — which often differs.
    // The field failure: a discarded installed-PWA relaunch reloads the manifest
    // start_url "/" (no locale → this script defaults to 'en'), so probing ONLY
    // /en/desk missed an Arabic-first owner's warmed /ar/desk and stranded them on
    // "You're offline". Fix: probe the path-locale desk FIRST, then any other warmed
    // locale, and forward to whichever is genuinely cached. A miss on all leaves the
    // page put (no redirect loop); never bounce a user already on that desk.
    if ('caches' in window) {
      var deskCandidates = [deskUrl];
      ['ar', 'en', 'fr'].forEach(function (l) {
        var u = '/' + l + '/desk';
        if (deskCandidates.indexOf(u) === -1) deskCandidates.push(u);
      });
      (function probe(i) {
        if (i >= deskCandidates.length) return;
        var u = deskCandidates[i];
        if (u === path) { probe(i + 1); return; } // already on this desk — don't bounce
        caches.match(u, { ignoreSearch: true }).then(function (hit) {
          if (hit) {
            deskUrl = u; // reconnect handler + CTA now target the warmed desk
            document.getElementById('desk-link').setAttribute('href', u);
            window.location.replace(u);
          } else {
            probe(i + 1);
          }
        }).catch(function () { probe(i + 1); });
      })(0);
    }

    // If the connection returns, go back to the app.
    function checkOnline() {
      if (navigator.onLine) window.location.href = deskUrl;
    }
    window.addEventListener('online', function () { setTimeout(checkOnline, 1000); });
  </script>
</body>
</html>
